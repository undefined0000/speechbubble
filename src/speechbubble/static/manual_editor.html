<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SpeechBubble Manual Editor</title>
  <style>
    :root {
      --bg: #eef2fb;
      --panel: #ffffff;
      --ink: #172033;
      --sub: #5b6b8b;
      --line: #d7deef;
      --accent: #0b5fff;
      --danger: #c53333;
      --ok: #117755;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: radial-gradient(circle at 0% 0%, #dde8ff 0%, var(--bg) 50%);
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
    }
    .page {
      max-width: 1220px;
      margin: 0 auto;
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 12px 25px rgba(22, 43, 95, 0.08);
    }
    .hero h1 {
      margin: 0 0 6px;
      font-size: 1.1rem;
    }
    .hero p {
      margin: 0;
      color: var(--sub);
      line-height: 1.45;
      font-size: 0.93rem;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(300px, 0.9fr);
      gap: 12px;
    }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 12px 24px rgba(19, 38, 77, 0.08);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    button, select, input[type=number], input[type=color], textarea {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--ink);
      background: #fff;
    }
    button {
      cursor: pointer;
      padding: 8px 10px;
      font-weight: 600;
      background: linear-gradient(180deg, #fff 0%, #f5f8ff 100%);
    }
    button.primary {
      color: #fff;
      border-color: var(--accent);
      background: var(--accent);
    }
    button.danger {
      color: #fff;
      border-color: var(--danger);
      background: var(--danger);
    }
    .toolbar .grow {
      flex: 1;
      min-width: 130px;
    }
    .zoom-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      min-width: 180px;
    }
    .zoom-wrap input[type=range] {
      width: 100%;
    }
    .canvas-viewport {
      border: 1px solid var(--line);
      border-radius: 12px;
      background:
        linear-gradient(45deg, #f8f9fd 25%, transparent 25%),
        linear-gradient(-45deg, #f8f9fd 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f8f9fd 75%),
        linear-gradient(-45deg, transparent 75%, #f8f9fd 75%);
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0;
      min-height: 380px;
      max-height: 74vh;
      overflow: auto;
      position: relative;
      touch-action: none;
    }
    #editorCanvas {
      display: block;
      margin: 0 auto;
      background: transparent;
      touch-action: none;
    }
    .empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sub);
      pointer-events: none;
      text-align: center;
      padding: 14px;
      line-height: 1.5;
      font-size: 0.93rem;
    }
    .status {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font-size: 0.9rem;
      color: var(--sub);
      background: #fff;
    }
    .status.ok { color: var(--ok); border-color: #9fd2bd; background: #effbf5; }
    .status.err { color: var(--danger); border-color: #f0b9b9; background: #fff4f4; }
    .panel h2 {
      margin: 10px 0 8px;
      font-size: 0.98rem;
    }
    .panel p {
      margin: 0;
      color: var(--sub);
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .field-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }
    .field-grid.single { grid-template-columns: 1fr; }
    .field label {
      display: block;
      margin: 0 0 4px;
      color: var(--sub);
      font-size: 0.83rem;
      font-weight: 600;
    }
    input[type=number], select, textarea {
      width: 100%;
      padding: 7px 8px;
    }
    textarea {
      min-height: 84px;
      resize: vertical;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .row input[type=checkbox] {
      width: auto;
      margin: 0;
    }
    .layer-list {
      margin: 8px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 6px;
      max-height: 240px;
      overflow: auto;
    }
    .layer-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 6px;
      background: #fff;
    }
    .layer-item.active {
      border-color: #9ec0ff;
      background: #edf4ff;
    }
    .layer-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .layer-actions {
      display: flex;
      gap: 4px;
    }
    .layer-actions button {
      padding: 4px 7px;
      font-size: 0.8rem;
    }
    .hidden {
      display: none !important;
    }
    .hint {
      margin-top: 8px;
      color: var(--sub);
      font-size: 0.83rem;
      line-height: 1.4;
    }
    .split {
      margin: 12px 0;
      border: 0;
      border-top: 1px dashed var(--line);
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Manual Speech Bubble Editor</h1>
      <p>
        顔認識は使わず、吹き出し・しっぽ・文字を手動で配置するツールです。
        画像を読み込んで「吹き出し追加 / テキスト追加」から編集してください。
      </p>
    </section>

    <section class="layout">
      <div class="card">
        <div class="toolbar">
          <button id="loadImageBtn" class="primary">画像を読み込む</button>
          <button id="addBubbleBtn">吹き出し追加</button>
          <button id="addTextBtn">テキスト追加</button>
          <button id="duplicateBtn">複製</button>
          <button id="deleteBtn" class="danger">削除</button>
          <button id="undoBtn">Undo</button>
          <button id="redoBtn">Redo</button>
          <button id="fitBtn">フィット</button>
          <div class="zoom-wrap grow">
            <span>Zoom</span>
            <input id="zoomRange" type="range" min="40" max="260" value="100">
            <strong id="zoomLabel">100%</strong>
          </div>
        </div>

        <div class="toolbar">
          <button id="saveProjectBtn">プロジェクト保存(JSON)</button>
          <button id="loadProjectBtn">プロジェクト読込(JSON)</button>
          <button id="exportPngBtn" class="primary">PNGを書き出し</button>
        </div>

        <div class="canvas-viewport" id="canvasViewport">
          <canvas id="editorCanvas"></canvas>
          <div id="emptyState" class="empty">画像を読み込むと編集を開始できます。</div>
        </div>
        <div id="statusBar" class="status">準備完了</div>

        <div class="hint">
          操作: オブジェクトをドラッグ移動 / 右下ハンドルでサイズ変更 / 吹き出し先端ハンドルでしっぽ先調整。
        </div>
      </div>

      <aside class="card panel">
        <h2>選択中オブジェクト</h2>
        <p id="noSelectionText">未選択です。キャンバス上のオブジェクトをタップしてください。</p>

        <div id="propPanel" class="hidden">
          <div class="field-grid">
            <div class="field">
              <label>タイプ</label>
              <input id="propKind" type="text" readonly>
            </div>
            <div class="field" id="propShapeWrap">
              <label>図形</label>
              <select id="propShape">
                <option value="ellipse">ellipse</option>
                <option value="rounded">rounded</option>
              </select>
            </div>
          </div>

          <div class="field-grid single" style="margin-top:8px;">
            <div class="field">
              <label>テキスト</label>
              <textarea id="propText"></textarea>
            </div>
          </div>

          <div class="field-grid" style="margin-top:8px;">
            <div class="field"><label>X</label><input id="propX" type="number"></div>
            <div class="field"><label>Y</label><input id="propY" type="number"></div>
            <div class="field"><label>幅</label><input id="propW" type="number" min="20"></div>
            <div class="field"><label>高さ</label><input id="propH" type="number" min="20"></div>
          </div>

          <div id="bubbleTailFields" class="field-grid" style="margin-top:8px;">
            <div class="field"><label>Tail X</label><input id="propTailX" type="number"></div>
            <div class="field"><label>Tail Y</label><input id="propTailY" type="number"></div>
          </div>

          <div class="field-grid" style="margin-top:8px;">
            <div class="field"><label>文字サイズ</label><input id="propFontSize" type="number" min="8"></div>
            <div class="field"><label>余白</label><input id="propPadding" type="number" min="0"></div>
            <div class="field"><label>線幅</label><input id="propStrokeWidth" type="number" min="0"></div>
            <div class="field">
              <label>文字寄せ</label>
              <select id="propAlign">
                <option value="center">center</option>
                <option value="left">left</option>
              </select>
            </div>
          </div>

          <div class="field-grid" style="margin-top:8px;">
            <div class="field"><label>塗り</label><input id="propFill" type="color"></div>
            <div class="field"><label>枠線</label><input id="propStroke" type="color"></div>
            <div class="field"><label>文字色</label><input id="propTextColor" type="color"></div>
            <div class="field hidden" id="propTextBoxField">
              <label>テキスト背景</label>
              <div class="row">
                <input id="propUseTextBox" type="checkbox">
                <span>背景あり</span>
              </div>
            </div>
          </div>
        </div>

        <hr class="split">
        <h2>レイヤー</h2>
        <ul id="layerList" class="layer-list"></ul>
      </aside>
    </section>
  </div>

  <input id="imageInput" type="file" accept="image/png,image/jpeg,image/webp" class="hidden">
  <input id="projectInput" type="file" accept=".json,application/json" class="hidden">

  <script src="/assets/manual_editor.js"></script>
</body>
</html>
